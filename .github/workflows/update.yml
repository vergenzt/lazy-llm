name: update

on:
  schedule:
    - cron: '0 6 * * *'   # once a day, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

# Never let two update runs race to push main.
concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Rebrand upstream head and commit
        run: scripts/rebrand-update.sh
